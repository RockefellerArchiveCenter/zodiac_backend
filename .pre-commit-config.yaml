repos:
- repo: https://github.com/hhatto/autopep8
  rev: v2.3.2
  hooks:
  - id: autopep8
    args:
      - --in-place
      - --aggressive
- repo: https://github.com/pycqa/flake8
  rev: 7.2.0
  hooks:
  - id: flake8
- repo: https://github.com/pycqa/isort
  rev: 6.0.1
  hooks:
  - id: isort
- repo: https://github.com/jazzband/pip-tools
  rev: 7.4.1
  hooks:
    - id: pip-compile
